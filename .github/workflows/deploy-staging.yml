name: Deploy Staging

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm test:integration
      - run: pnpm build:cf

      - name: Apply D1 migrations (staging)
        run: |
          if [ -d "lib/db/migrations" ] && ls lib/db/migrations/*.sql 2>/dev/null | grep -q .; then
            pnpm exec wrangler d1 migrations apply pokerreads-db-staging --remote
          else
            echo "No migrations found, skipping"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (staging)
        id: deploy
        run: |
          OUTPUT=$(pnpm exec opennextjs-cloudflare deploy 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev' | head -1)
          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: E2E smoke tests
        run: pnpm test:e2e:smoke
        env:
          E2E_BASE_URL: ${{ steps.deploy.outputs.deploy_url }}
