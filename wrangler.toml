name = "pokerreads"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "pokerreads-db"
database_id = "b5bb070c-00be-4110-ba6f-8fc9909dc4de"
migrations_dir = "lib/db/migrations"

[[r2_buckets]]
binding = "PLAYER_PHOTOS"
bucket_name = "pokerreads-photos"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "86fb9e18ef0e43a5a719c65fa07455c9"

[ai]
binding = "AI"

[vars]
NEXT_PUBLIC_APP_URL = "https://pokerreads.app"
# Stripe Pro price IDs. Create both in the Stripe dashboard (EUR currency):
#   - Monthly recurring at €4.99/mo
#   - Yearly recurring at €44.99/yr (~25% off)
# Replace the placeholders below with the resulting `price_...` IDs.
NEXT_PUBLIC_STRIPE_PRO_PRICE_ID_MONTHLY = "price_1TNxAm03IQZJpCYqet69zF0B"
NEXT_PUBLIC_STRIPE_PRO_PRICE_ID_YEARLY = "price_REPLACE_WITH_YEARLY_PRICE_ID"
